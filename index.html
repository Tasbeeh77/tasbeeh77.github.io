  star:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/></svg>',
};

function render(){
  const d = DATA, L = d.links;

  $("hero-eyebrow").textContent = d.eyebrow;
  $("hero-name").innerHTML = d.name.replace(d.nameAccent, `<span class="accent">${d.nameAccent}</span>`);
  $("hero-lede").innerHTML = d.lede;
  $("hero-meta").innerHTML = d.meta.map(m => `<span><i class="dot"></i>${m}</span>`).join("");
  $("hero-cta").innerHTML =
    `<a class="btn primary" href="${L.cv}" download>${ICON.dl}Download CV</a>` +
    `<a class="btn" href="mailto:${L.email}">${ICON.mail}Email</a>` +
    `<a class="btn" href="${L.linkedin}" target="_blank" rel="noopener">${ICON.in}LinkedIn</a>` +
    `<a class="btn" href="${L.github}" target="_blank" rel="noopener">${ICON.gh}GitHub</a>`;

  $("about-text").innerHTML = d.about.map(p => `<p>${p}</p>`).join("");
  $("quick-facts").innerHTML = `<h4>Quick facts</h4>` +
    d.facts.map(([k,v]) => `<div class="fact"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("");

  const x = d.experience;
  $("xp").innerHTML =
    `<div class="xp-head"><div class="xp-role">${x.role} <span>@ ${x.company}</span></div><div class="xp-when">${x.when}</div></div>` +
    `<p class="xp-intro">${x.intro}</p>` +
    `<ul>${x.points.map(p => `<li>${p}</li>`).join("")}</ul>` +
    (x.award ? `<div class="award">${ICON.star}${x.award}</div>` : "");

  if(d.featured){
    const f = d.featured;
    $("featured").innerHTML =
      `<div class="feat reveal"><div class="tag-lead">${f.tag}</div>` +
      `<h3>${f.title}</h3><p>${f.desc}</p>` +
      (f.flow ? `<div class="flow">${f.flow}</div>` : "") +
      `<div class="card-top" style="margin-top:18px"><div class="chips">${f.stack.map(s=>`<span class="chip">${s}</span>`).join("")}</div></div></div>`;
  }

  $("projects").innerHTML = d.projects.map(p => {
    const links = [];
    if(p.repo) links.push(`<a href="${p.repo}" target="_blank" rel="noopener">${ICON.gh}Code</a>`);
    if(p.live) links.push(`<a href="${p.live}" target="_blank" rel="noopener">${ICON.link}Live</a>`);
    return `<div class="card reveal"><div class="card-top"><h3>${p.name}</h3><span class="lang">${p.lang}</span></div>` +
      `<p>${p.desc}</p>` + (links.length?`<div class="links">${links.join("")}</div>`:"") + `</div>`;
  }).join("");

  $("skills-grid").innerHTML = d.skills.map(([h, items]) =>
    `<div class="skill-block reveal"><h4>${h}</h4><div class="chips">${items.map(i=>`<span class="chip">${i}</span>`).join("")}</div></div>`
  ).join("");

  $("contact-line").innerHTML = d.contactLine;
  $("contact-cta").innerHTML =
    `<a class="btn primary" href="mailto:${L.email}">${ICON.mail}${L.email}</a>` +
    `<a class="btn" href="${L.linkedin}" target="_blank" rel="noopener">${ICON.in}LinkedIn</a>` +
    `<a class="btn" href="${L.github}" target="_blank" rel="noopener">${ICON.gh}GitHub</a>`;

  $("foot-left").textContent = `© ${new Date().getFullYear()} ${d.name}`;

  // staggered reveal
  const els = [...document.querySelectorAll(".reveal")];
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); }});
  }, { threshold:.12 });
  els.forEach(el=>io.observe(el));
  // hero elements stagger immediately
  document.querySelectorAll("header .reveal").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("in"), 90*i);
  });
}
render();
</script>
</body>
</html>
